# Despliegue automático en Azure Web App cuando haces push a main.
#
# Paso 1: En Azure Portal, crea tu Web App y anota el NOMBRE (app-name).
# Paso 2: Portal → tu Web App → Descargar perfil de publicación.
# Paso 3: GitHub repo → Settings → Secrets and variables → Actions → New repo secret:
#        Nombre: AZURE_WEBAPP_PUBLISH_PROFILE
#        Valor: pega todo el contenido del archivo .PublishSettings descargado.
# Paso 4: GitHub → Settings → Secrets and variables → Variables → New repository variable:
#        nombre: AZURE_WEBAPP_NAME  | valor: el nombre EXACTO de tu Web App en Azure

name: Deploy Node.js to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
