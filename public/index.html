<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segunda Serie - Xavier Reyes</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 50%, #0c4a6e 100%);
        color: #e2e8f0;
      }
      main {
        text-align: center;
        padding: 2rem 1.5rem;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
        max-width: 36rem;
      }
      h1 {
        font-size: clamp(1.35rem, 4vw, 1.85rem);
        font-weight: 600;
        margin: 0 0 0.75rem;
        letter-spacing: 0.02em;
      }
      p.nombre {
        margin: 0;
        font-size: clamp(1.1rem, 3vw, 1.4rem);
        font-weight: 700;
        color: #38bdf8;
        line-height: 1.45;
        text-wrap: balance;
      }
      .badge {
        display: inline-block;
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nombre del estudiante</h1>
      <p class="nombre">CHRISTIAN XAVIER REYES VALENZUELA</p>
      <span class="badge">Node.js • HTML • Azure</span>
    </main>
  </body>
</html>
